name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go vet ./...
      - run: go test -cover ./...

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      # TinyGo 0.41+ adds Go 1.26 support (release notes: "builder: support Go
      # 1.26 now"). Bump TinyGo and Go together when upgrading either.
      - name: Install TinyGo
        run: |
          wget https://github.com/tinygo-org/tinygo/releases/download/v0.41.1/tinygo_0.41.1_amd64.deb
          sudo dpkg -i tinygo_0.41.1_amd64.deb
      - name: Build WASM
        run: tinygo build -o plugin-http.wasm -target=wasi ./
      - name: Check WASM size
        run: ls -lh plugin-http.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-http.wasm
          path: plugin-http.wasm
